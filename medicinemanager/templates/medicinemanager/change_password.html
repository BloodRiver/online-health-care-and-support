{% extends 'medicinemanager/base.html' %}

{% block title %}Change Password{% endblock %}

{% block body %}
    <div style="width: 50%; margin: auto; margin-top: 2%;">
        <form class="mb-3" method="POST" enctype="multipart/form-data">
            <h1 class="text-center mb-3">Change Password</h1>
            {% csrf_token %}
            
            {% if form.instance.picture %}<img width="150px" src="{{ form.instance.picture.url }}" style="margin: auto; border-radius: 100px" class="mb-3 d-block">{% endif %}
            {% include 'medicinemanager/form_template.html'%}

            <div class="d-flex justify-content-center">
                <div class="p-2">
                    <button class="btn btn-success" type="submit">Save</button>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
