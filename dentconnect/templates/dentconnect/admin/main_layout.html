<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DentConnect - Dental Clinic Management</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome 6 (free icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    {% load static %}
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'dentconnect/css/style.css' %}" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav
      class="navbar navbar-expand-lg navbar-light"
      style="background-color: #87ceeb"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dentconnect:admin_dashboard' %}">
          <i class="fas fa-tooth me-2"></i>DentConnect
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <!-- Admin Menu -->
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dentconnect:admin_dashboard' %}"
                ><i class="fas fa-home"></i> Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dentconnect:admin_manage_users' %}"
                ><i class="fas fa-users-cog"></i> Users</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dentconnect:admin_appointments' %}"
                ><i class="fas fa-calendar-alt"></i> Appointments</a
              >
            </li>

            <!-- User Dropdown Menu (replaces separate username and logout) -->
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="userDropdown"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="fas fa-user-circle"></i> Hasanal Karim
              </a>
              <ul
                class="dropdown-menu dropdown-menu-end"
                aria-labelledby="userDropdown"
              >
                <li>
                  <a class="dropdown-item" href="{% url 'dentconnect:profile' %}"
                    ><i class="fas fa-id-card"></i> Profile</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="{% url 'dentconnect:settings' %}"
                    ><i class="fas fa-cog"></i> Settings</a
                  >
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a
                    class="dropdown-item text-danger"
                    href="{% url 'dentconnect:index' %}"
                    ><i class="fas fa-sign-out-alt"></i> Logout</a
                  >
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    {% block body %} {% endblock %}

    <!-- Footer -->
    <footer
      class="bg-light text-center text-muted py-3 mt-5"
      style="background-color: #e6e6fa !important"
    >
      <div class="container">
        <p class="mb-0">&copy; 2026 DentConnect</p>
        <small
          >Your smile, our priority
          <i class="fas fa-smile" style="color: #87ceeb"></i
        ></small>
      </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
