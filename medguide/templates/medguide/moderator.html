<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'medguide/style.css' %}">
    <title>MedGuide | Moderator Dashboard</title>
</head>
<body>
    <div class="container">
        <h2>Moderator Logic Management</h2>
        <div class="card">
            <h3>Add New Symptom Mapping</h3>
            <div class="flex-split">
                <input type="text" placeholder="Symptom Name">
                <select>
                    <option>Select Specialist</option>
                    <option>Cardiologist</option>
                    <option>ENT</option>
                </select>
                <button class="btn btn-primary">Save Mapping</button>
            </div>
        </div>
        <h3>Existing Mapping Table</h3>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: var(--light-blue); text-align: left;">
                    <th style="padding:10px;">Symptom</th>
                    <th style="padding:10px;">Mapped Specialist</th>
                    <th style="padding:10px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding:10px;">Cough</td>
                    <td style="padding:10px;">Pulmonologist</td>
                    <td style="padding:10px;"><button class="badge">Edit</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
