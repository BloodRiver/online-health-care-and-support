<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'medguide/style.css' %}">
    <title>MedGuide | Report Preview</title>
</head>
<body>
    <div class="container">
        <h2 class="text-center">Pre-screening Report</h2>
        <div class="card">
            <p><strong>Patient:</strong> [User Name]</p>
            <p><strong>Date:</strong> Oct 24, 2023</p>
            <hr>
            <h3>Symptom List</h3>
            <ul>
                <li>Cough (Duration: 1 Week, Intensity: 6/10)</li>
            </ul>
            <h3>Recommended Specialist</h3>
            <p>Pulmonologist</p>
        </div>
        <div class="text-center">
            <button class="btn btn-primary">Download PDF</button>
            <button class="btn" style="background:#edf2f7">Print Report</button>
        </div>
    </div>
</body>
</html>
